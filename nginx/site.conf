# ====================================================================
# nginx/site.conf — Production Reverse Proxy for AgroConnect
# --------------------------------------------------------------------
# FILE ROLE:
#   • Reverse proxy to backend (Flask/Gunicorn)
#   • WebSocket upgrade for Socket.IO
#   • Serves /uploads/ directly from shared Docker volume
#
# IMPORTANT:
#   • Nginx container must mount the SAME uploads volume at /app/uploads
#   • Socket.IO typically uses /socket.io (not /api/socket.io)
# ====================================================================

server {
    listen 80;
    server_name _;

    # -----------------------------
    # GZIP Compression
    # -----------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # ---------------------------------------------------------------
    # Serve public uploads (shared volume)
    # ---------------------------------------------------------------
    location /uploads/ {
        alias /app/uploads/;
        autoindex off;
        access_log off;
        expires 30d;

        # Basic hardening
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ---------------------------------------------------------------
    # Socket.IO (WebSocket + long-polling)
    # ---------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend:5000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ---------------------------------------------------------------
    # API backend proxy
    # ---------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:5000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ---------------------------------------------------------------
    # Optional: React build served by Nginx
    # ---------------------------------------------------------------
    # location / {
    #     root /usr/share/nginx/html;
    #     try_files $uri /index.html;
    # }
}
