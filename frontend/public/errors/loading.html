<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading • AgroConnect</title>
  <style>
    :root {
      --primary: #facc15;   /* Namibia-gold */
      --bg: #0a0f0d;        /* deep black/green */
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #facc15, #fbbf24, #facc15);
      -webkit-background-clip: text;
      color: transparent;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: -200px; }
      to { background-position: 200px; }
    }

    .dot-loader {
      display: flex;
      gap: 8px;
    }

    .dot-loader div {
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }

    .dot-loader div:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot-loader div:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      to {
        transform: translateY(-10px);
        opacity: 0.3;
      }
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="logo">AgroConnect Namibia</div>
    <div class="dot-loader">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</body>
</html>
