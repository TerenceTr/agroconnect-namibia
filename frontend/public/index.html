<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- =========================================================================
         AgroConnect Namibia — public/index.html
         -------------------------------------------------------------------------
         FILE ROLE:
           Static HTML shell served by CRA. Defines #root mount node and an
           optional splash overlay that appears BEFORE React bundles load.

         KEY STABILITY RULE:
           ✅ Never hide #root with display:none.
           If the splash fails to load or animate, the app must still render.
         ========================================================================= -->

    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#065F46" />
    <meta
      name="description"
      content="AgroConnect Namibia — Digital marketplace for farmers & customers with AI insights."
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>AgroConnect Namibia</title>

    <!--
      Splash styles inline so they load BEFORE React bundles.
      This prevents the “blank background” state if JS loads slowly.
    -->
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        background: #054435; /* deep green fallback */
      }
      #loading-screen iframe {
        width: 100%;
        height: 100%;
        display: block;
        border: 0;
      }

      /* Root must always exist & be visible (never display:none). */
      #root {
        min-height: 100vh;
      }

      /* Optional class used by src/index.js to fade the splash out. */
      #loading-screen.fade-out {
        animation: splashFadeOut 0.5s ease-out forwards;
        pointer-events: none;
      }
      @keyframes splashFadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          visibility: hidden;
        }
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Optional splash overlay (safe even if it fails; root still renders). -->
    <div id="loading-screen">
      <iframe src="/loading.html" title="Loading AgroConnect"></iframe>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>
  </body>
</html>
